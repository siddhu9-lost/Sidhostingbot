<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle | Secure Access</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #030712;
            --glass: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
            color: #94a3b8;
        }

        .tab.active {
            background: var(--primary);
            color: #030712;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #030712;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        #auth-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo"><i class="fas fa-bolt"></i> EcoCycle</div>
    
    <div class="tabs">
        <div class="tab active" id="login-tab" onclick="switchTab('login')">Login</div>
        <div class="tab" id="reg-tab" onclick="switchTab('register')">Register</div>
    </div>

    <form id="auth-form">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@company.com" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" id="submit-btn">Enter System</button>
    </form>

    <div id="auth-msg"></div>
</div>

<script>
    let mode = 'login';
    const users = JSON.parse(localStorage.getItem('ecocycle_users')) || [];

    function switchTab(newMode) {
        mode = newMode;
        document.getElementById('login-tab').classList.toggle('active', mode === 'login');
        document.getElementById('reg-tab').classList.toggle('active', mode === 'register');
        document.getElementById('submit-btn').innerText = mode === 'login' ? 'Enter System' : 'Create Account';
        document.getElementById('auth-msg').innerText = "";
    }

    document.getElementById('auth-form').onsubmit = function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('auth-msg');

        if (mode === 'register') {
            if (users.find(u => u.email === email)) {
                msg.style.color = '#ff4d4d';
                msg.innerText = "Email already registered!";
                return;
            }
            users.push({ email, pass });
            localStorage.setItem('ecocycle_users', JSON.stringify(users));
            msg.style.color = 'var(--primary)';
            msg.innerText = "Account created! Switching to login...";
            setTimeout(() => switchTab('login'), 1500);
        } else {
            const user = users.find(u => u.email === email && u.pass === pass);
            if (user) {
                localStorage.setItem('ecocycle_session', JSON.stringify(user));
                msg.style.color = 'var(--primary)';
                msg.innerText = "Access Granted. Initializing...";
                setTimeout(() => window.location.href = 'index.html', 1000); // Redirect to main
            } else {
                msg.style.color = '#ff4d4d';
                msg.innerText = "Invalid credentials!";
            }
        }
    };
</script>

</body>
</html>
