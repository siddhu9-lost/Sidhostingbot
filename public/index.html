<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle | Modern E-Waste Utility</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-seedling"></i> EcoCycle</div>
    <div style="font-weight: 600; color: var(--text-muted);">
        <i class="far fa-user-circle"></i> Digital Agent
    </div>
</nav>

<div class="container">
    <main>
        <!-- Map Section -->
        <div class="box">
            <h3><i class="fas fa-map-marked-alt" style="color: #3b82f6;"></i> Drop-off Network</h3>
            <div id="map"></div>
        </div>

        <!-- Logging Section -->
        <div class="box">
            <h3><i class="fas fa-pen-fancy" style="color: var(--primary);"></i> Log Disposal</h3>
            
            <label>Device Details</label>
            <input type="text" id="item-name" placeholder="What are you recycling?">
            
            <label>Impact Category</label>
            <select id="item-cat">
                <option value="100">Small Tech (Phones, Mice) - 100pt</option>
                <option value="500">Major Goods (TV, Fridge) - 500pt</option>
                <option value="50">Essentials (Cables, Cells) - 50pt</option>
            </select>

            <div style="margin-top: 20px; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="pickup-toggle" style="width: auto; margin: 0;"> 
                <span style="font-size: 0.9rem; font-weight: 500;">Request doorstep collection?</span>
            </div>

            <button class="btn" onclick="addEntry()">Complete Transaction</button>
        </div>
    </main>

    <aside class="sidebar">
        <!-- Dashboard Score -->
        <div class="box stat-card">
            <p>Your Eco-Contribution</p>
            <div class="points" id="total-points">0</div>
            <small>Credits Available</small>
        </div>

        <!-- Activity Feed -->
        <div class="box">
            <h4 style="margin-top:0; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Recent Activity</h4>
            <div id="activity-list">
                <!-- Data injected here -->
            </div>
            <button onclick="clearData()" style="background:none; border:none; color: #ef4444; cursor:pointer; font-size: 0.8rem; margin-top: 15px; font-weight: 600;">
                <i class="fas fa-trash-alt"></i> Wipe Records
            </button>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let data = JSON.parse(localStorage.getItem('ecocycle_attractive')) || { items: [], points: 0 };

    const map = L.map('map', { zoomControl: false }).setView([19.076, 72.877], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    const centers = [
        {name: "Green Hub Central", pos: [19.076, 72.877]},
        {name: "North Recycle Post", pos: [19.150, 72.930]},
        {name: "West Tech Salvage", pos: [19.050, 72.830]}
    ];
    centers.forEach(c => L.marker(c.pos).addTo(map).bindPopup(`<b>${c.name}</b><br>Accepting E-Waste Now`));

    function addEntry() {
        const name = document.getElementById('item-name').value;
        const pts = parseInt(document.getElementById('item-cat').value);
        const pickup = document.getElementById('pickup-toggle').checked;

        if (!name) {
            alert("Please identify the item.");
            return;
        }

        data.items.unshift({ name, points: pts, pickup, date: new Date().toLocaleDateString() });
        data.points += pts;
        localStorage.setItem('ecocycle_attractive', JSON.stringify(data));
        
        updateUI();
        document.getElementById('item-name').value = "";
    }

    function updateUI() {
        document.getElementById('total-points').innerText = data.points;
        const list = document.getElementById('activity-list');
        
        if (data.items.length === 0) {
            list.innerHTML = `<p style="color:#94a3b8; font-size:0.9rem; text-align:center;">No recent logs found.</p>`;
            return;
        }

        list.innerHTML = data.items.slice(0, 4).map(i => `
            <div class="history-item">
                <div>
                    <div style="font-weight:700; font-size:0.9rem;">${i.name}</div>
                    <div style="font-size:0.75rem; color:#64748b;">${i.date}</div>
                </div>
                <span class="status-badge">${i.pickup ? 'Pickup' : 'Drop'}</span>
            </div>
        `).join('');
    }

    function clearData() {
        if(confirm("Confirm deletion of all eco-records?")) {
            data = { items: [], points: 0 };
            localStorage.setItem('ecocycle_attractive', JSON.stringify(data));
            updateUI();
        }
    }

    updateUI();
</script>
</body>
</html>
