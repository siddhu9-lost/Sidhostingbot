<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle Glass | E-Waste & Rewards</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00ffa3;
            --secondary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            color: var(--text);
            min-height: 100vh;
            /* Animated Background */
            background: linear-gradient(-45deg, #0f172a, #1e293b, #064e3b, #111827);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Effect */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        nav {
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.7);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }

        .card { padding: 25px; margin-bottom: 24px; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }

        .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }

        #map { height: 450px; border-radius: 15px; margin-top: 15px; border: 1px solid var(--glass-border); }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary);
            color: #000;
        }

        .btn:hover { box-shadow: 0 0 20px rgba(0, 255, 163, 0.4); transform: scale(1.02); }

        .points-badge {
            background: rgba(0, 255, 163, 0.15);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            font-weight: 800;
        }

        .badge { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .badge-open { background: #ef4444; color: white; }
        .badge-solved { background: var(--primary); color: #000; }

        .hidden { display: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="glass">
    <div class="logo"><i class="fas fa-atom"></i> ECOCYCLE</div>
    <div id="nav-right" class="hidden">
        <span id="user-points" class="points-badge"><i class="fas fa-bolt"></i> 0 Credits</span>
    </div>
</nav>

<div class="container">
    <!-- VIEW: LOGIN -->
    <div id="login-view" class="card glass" style="max-width: 400px; margin: 80px auto; text-align: center;">
        <h2 style="margin-bottom: 25px;">Neural Access</h2>
        <input type="text" id="username" placeholder="Full Name">
        <select id="role">
            <option value="user">Individual Agent</option>
            <option value="admin">Central Authority</option>
        </select>
        <button class="btn" style="width:100%; justify-content: center; margin-top: 20px;" onclick="handleLogin()">Initialize</button>
    </div>

    <!-- VIEW: USER DASHBOARD -->
    <div id="user-view" class="hidden">
        <div class="grid-2">
            <div class="card glass">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <h3><i class="fas fa-satellite-dish"></i> Facility Radar</h3>
                    <input type="text" id="mapSearch" placeholder="Filter Area..." style="width: 180px; margin: 0;" onkeyup="filterMap()">
                </div>
                <div id="map"></div>
            </div>
            
            <div class="card glass">
                <h3><i class="fas fa-upload"></i> Log E-Waste</h3>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImagePreview()">
                <div id="previewContainer" style="position: relative;">
                    <img id="imgPreview" style="width:100%; height:160px; object-fit:cover; display:none; border-radius:15px; margin:15px 0;">
                </div>
                <input type="text" id="itemName" placeholder="Device (e.g. iPhone, TV)" onkeyup="suggestCategory(this.value)">
                <select id="category">
                    <option value="General">Select Category</option>
                    <option value="Consumer Electronics">Consumer Electronics</option>
                    <option value="IT/Telecom">IT & Telecom</option>
                    <option value="Appliances">Large Appliances</option>
                </select>
                <button class="btn" style="width:100%" onclick="submitReport()"><i class="fas fa-plus-circle"></i> Submit Report</button>
            </div>
        </div>

        <div class="card glass">
            <h3><i class="fas fa-list-ul"></i> Transmission Logs</h3>
            <input type="text" id="ticketSearch" placeholder="Search my reports..." style="margin-bottom: 20px;" onkeyup="renderUserTickets()">
            <div id="userTicketList"></div>
        </div>
    </div>

    <!-- VIEW: ADMIN DASHBOARD -->
    <div id="admin-view" class="hidden">
        <div class="grid-2" style="grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center;">
            <div class="card glass"><small>Pending</small><h2 id="stat-pending">0</h2></div>
            <div class="card glass"><small>Recycled</small><h2 id="stat-solved" style="color: var(--primary);">0</h2></div>
            <div class="card glass"><small>Total Credits</small><h2 id="stat-credits" style="color: #3b82f6;">0</h2></div>
        </div>
        
        <div class="card glass" style="overflow-x: auto;">
            <h3>Central Management Console</h3>
            <table width="100%" style="border-collapse: collapse; margin-top: 15px;">
                <thead>
                    <tr style="text-align: left; border-bottom: 1px solid var(--glass-border);">
                        <th style="padding: 15px;">Agent</th>
                        <th>Device</th>
                        <th>Status</th>
                        <th>GPS</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let db = JSON.parse(localStorage.getItem('ecocycle_glass_db')) || { tickets: [], users: {} };
    function saveDB() { localStorage.setItem('ecocycle_glass_db', JSON.stringify(db)); }

    let session = { user: '', role: '', coords: [20.5937, 78.9629] };
    const map = L.map('map', { zoomControl: false }).setView(session.coords, 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function handleLogin() {
        session.user = document.getElementById('username').value || 'Guest';
        session.role = document.getElementById('role').value;
        if (!db.users[session.user]) db.users[session.user] = { points: 0 };
        
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('nav-right').classList.remove('hidden');
        updatePointsDisplay();

        if (session.role === 'user') {
            document.getElementById('user-view').classList.remove('hidden');
            renderUserTickets();
            navigator.geolocation.getCurrentPosition(p => {
                session.coords = [p.coords.latitude, p.coords.longitude];
                map.setView(session.coords, 13);
                L.circle(session.coords, {radius: 500, color: '#00ffa3', fillOpacity: 0.2}).addTo(map);
            });
        } else {
            document.getElementById('admin-view').classList.remove('hidden');
            renderAdminView();
        }
        setTimeout(() => map.invalidateSize(), 400);
    }

    // AI CATEGORY SUGGESTION (NEW)
    function suggestCategory(val) {
        const cat = document.getElementById('category');
        val = val.toLowerCase();
        if (val.match(/phone|laptop|mouse|tablet/)) cat.value = "IT/Telecom";
        else if (val.match(/fridge|ac|oven|wash/)) cat.value = "Appliances";
        else if (val.match(/tv|camera|speaker/)) cat.value = "Consumer Electronics";
    }

    function handleImagePreview() {
        const file = document.getElementById('imageInput').files[0];
        const reader = new FileReader();
        reader.onload = e => {
            const preview = document.getElementById('imgPreview');
            preview.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(file);
    }

    function submitReport() {
        const item = document.getElementById('itemName').value;
        if(!item) return alert("Describe the device");

        const ticket = {
            id: 'TX-' + Date.now().toString(16),
            user: session.user,
            item,
            category: document.getElementById('category').value,
            coords: session.coords,
            status: 'Open',
            img: document.getElementById('imgPreview').src || ''
        };

        db.tickets.push(ticket);
        saveDB();
        renderUserTickets();
        alert("Transmission Success! +50 Credits Pending Approval.");
    }

    function renderUserTickets() {
        const query = document.getElementById('ticketSearch').value.toLowerCase();
        const list = document.getElementById('userTicketList');
        const tasks = db.tickets.filter(t => t.user === session.user && t.item.toLowerCase().includes(query));
        
        list.innerHTML = tasks.map(t => `
            <div class="glass" style="display:flex; align-items:center; justify-content:space-between; padding:15px; margin-bottom:10px; border-radius:12px;">
                <div style="display:flex; align-items:center; gap:15px;">
                    <img src="${t.img}" style="width:45px; height:45px; border-radius:8px; object-fit:cover;">
                    <div><strong>${t.item}</strong><br><small style="opacity:0.6">${t.category}</small></div>
                </div>
                <span class="badge ${t.status === 'Open' ? 'badge-open' : 'badge-solved'}">${t.status}</span>
            </div>
        `).join('');
    }

    function renderAdminView() {
        document.getElementById('stat-pending').innerText = db.tickets.filter(t => t.status === 'Open').length;
        document.getElementById('stat-solved').innerText = db.tickets.filter(t => t.status === 'Solved').length;
        document.getElementById('stat-credits').innerText = Object.values(db.users).reduce((a, b) => a + b.points, 0);

        const body = document.getElementById('adminListBody');
        body.innerHTML = db.tickets.map(t => `
            <tr style="border-bottom: 1px solid var(--glass-border);">
                <td style="padding:15px;">${t.user}</td>
                <td>${t.item}</td>
                <td><span class="badge ${t.status === 'Open' ? 'badge-open' : 'badge-solved'}">${t.status}</span></td>
                <td><a href="https://maps.google.com?q=${t.coords[0]},${t.coords[1]}" target="_blank" style="color:var(--primary);"><i class="fas fa-location-arrow"></i></a></td>
                <td>
                    ${t.status === 'Open' ? `<button class="btn" style="padding:5px 10px; font-size:10px;" onclick="resolveTicket('${t.id}')">Approve</button>` : '✅'}
                </td>
            </tr>
        `).join('');
    }

    function resolveTicket(id) {
        const t = db.tickets.find(x => x.id === id);
        if(t) {
            t.status = 'Solved';
            db.users[t.user].points += 50;
            saveDB();
            renderAdminView();
        }
    }

    function updatePointsDisplay() {
        if(db.users[session.user]) {
            document.getElementById('user-points').innerHTML = `<i class="fas fa-bolt"></i> ${db.users[session.user].points} Credits`;
        }
    }
</script>
</body>
</html>
