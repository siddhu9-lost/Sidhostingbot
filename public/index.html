<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle | Premium E-Waste Recovery</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Maps API (Note: Requires API Key for production) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-bolt"></i> EcoCycle</div>
    <div style="font-weight: 600;"><i class="fas fa-circle" style="color: #00ff00; font-size: 8px;"></i> Live Network</div>
</nav>

<div class="container">
    <main>
        <div class="box">
            <h3><i class="fas fa-map-pin" style="color: var(--primary);"></i> 1. Pick Location</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">Click on the map to set your pickup/drop-off point.</p>
            <div id="map"></div>
            <p id="loc-status" style="margin-top: 10px; font-size: 0.9rem; color: var(--primary);">
                <i class="fas fa-location-arrow"></i> Using Default Center
            </p>
        </div>

        <div class="box">
            <h3><i class="fas fa-camera" style="color: var(--primary);"></i> 2. Item Details</h3>
            
            <label>Upload Device Photo</label>
            <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">
            <img id="preview" class="img-preview">

            <label style="display:block; margin-top:15px;">Device Name</label>
            <input type="text" id="item-name" placeholder="e.g. Broken iPhone 12">
            
            <label style="display:block; margin-top:15px;">Impact Category</label>
            <select id="item-cat">
                <option value="100">Small Electronics (100 pts)</option>
                <option value="500">Major Appliances (500 pts)</option>
                <option value="50">Cables & Accessories (50 pts)</option>
            </select>

            <button class="btn" onclick="addEntry()">Finalize Log</button>
        </div>
    </main>

    <aside>
        <div class="box stat-card">
            <p>Your Total Impact</p>
            <div class="points" id="total-points">0</div>
            <small style="text-transform: uppercase; letter-spacing: 2px;">Green Credits</small>
        </div>

        <div class="box">
            <h4 style="margin-top:0;">Recent Logs</h4>
            <div id="activity-list"></div>
            <button onclick="clearData()" style="background:none; border:none; color: #ff4d4d; cursor:pointer; font-size: 0.8rem; margin-top: 15px; width:100%; text-align:center;">
                <i class="fas fa-undo"></i> Clear All Data
            </button>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let data = JSON.parse(localStorage.getItem('ecocycle_v4')) || { items: [], points: 0 };
    let selectedCoords = [19.076, 72.877];
    let capturedImage = "";

    // Initialize Map
    const map = L.map('map', { zoomControl: false }).setView(selectedCoords, 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let marker = L.marker(selectedCoords, {draggable: true}).addTo(map);

    // Map Click Functionality
    map.on('click', function(e) {
        selectedCoords = [e.latlng.lat, e.latlng.lng];
        marker.setLatLng(e.latlng);
        document.getElementById('loc-status').innerHTML = `<i class="fas fa-check-circle"></i> Location Pinned: ${selectedCoords[0].toFixed(3)}, ${selectedCoords[1].toFixed(3)}`;
    });

    // Image Preview
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            capturedImage = reader.result;
            const preview = document.getElementById('preview');
            preview.src = capturedImage;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function addEntry() {
        const name = document.getElementById('item-name').value;
        const pts = parseInt(document.getElementById('item-cat').value);

        if (!name || !capturedImage) {
            alert("Please upload a photo and enter item name.");
            return;
        }

        const entry = {
            name,
            points: pts,
            image: capturedImage,
            coords: selectedCoords,
            date: new Date().toLocaleDateString()
        };

        data.items.unshift(entry);
        data.points += pts;
        localStorage.setItem('ecocycle_v4', JSON.stringify(data));
        
        updateUI();
        resetForm();
    }

    function resetForm() {
        document.getElementById('item-name').value = "";
        document.getElementById('file-input').value = "";
        document.getElementById('preview').style.display = 'none';
        capturedImage = "";
    }

    function updateUI() {
        document.getElementById('total-points').innerText = data.points;
        const list = document.getElementById('activity-list');
        
        if (data.items.length === 0) {
            list.innerHTML = `<p style="text-align:center; opacity:0.5;">No entries yet.</p>`;
            return;
        }

        list.innerHTML = data.items.slice(0, 4).map(i => `
            <div class="history-item">
                <img src="${i.image}" class="thumb">
                <div style="flex:1">
                    <div style="font-weight:700;">${i.name}</div>
                    <div style="font-size:0.7rem; opacity:0.6;">${i.date} • ${i.points} pts</div>
                </div>
                <i class="fas fa-map-marker-alt" style="color:var(--primary); font-size: 0.8rem;" title="${i.coords}"></i>
            </div>
        `).join('');
    }

    function clearData() {
        if(confirm("Wipe all data?")) {
            data = { items: [], points: 0 };
            localStorage.setItem('ecocycle_v4', JSON.stringify(data));
            updateUI();
        }
    }

    updateUI();
</script>
</body>
</html>
