<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle Simple</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text);
        }

        /* Top Bar */
        nav {
            background: white; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo { font-weight: bold; color: var(--primary); font-size: 20px; }

        .container { max-width: 1000px; margin: 20px auto; padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }

        /* Main Components */
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #map { height: 350px; border-radius: 8px; margin-top: 15px; border: 1px solid #e2e8f0; }

        /* Form Elements */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #16a34a; }

        /* Simple Counter */
        .stat-card { text-align: center; padding: 15px; background: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0; }
        .points { font-size: 24px; font-weight: bold; color: var(--primary); }

        /* History List */
        .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .status-badge { background: #e2e8f0; padding: 2px 8px; border-radius: 10px; font-size: 11px; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-recycle"></i> EcoCycle</div>
    <div id="user-display" style="font-weight: 500;">Welcome, Guest</div>
</nav>

<div class="container">
    <!-- LEFT COLUMN -->
    <div class="main-content">
        <!-- STEP 1: DROP OFF LOCATIONS -->
        <div class="box">
            <h3 style="margin-top:0"><i class="fas fa-map-marker-alt"></i> Find Nearby Drop-off</h3>
            <p style="font-size: 14px; color: #64748b;">Click the markers on the map to see center hours.</p>
            <div id="map"></div>
        </div>

        <!-- STEP 2: LOG ITEM -->
        <div class="box">
            <h3><i class="fas fa-plus"></i> New Disposal Entry</h3>
            <label>What are you recycling?</label>
            <input type="text" id="item-name" placeholder="e.g. Old Laptop, Phone Charger">
            
            <label>Category</label>
            <select id="item-cat">
                <option value="100">Small Electronics (100 pts)</option>
                <option value="500">Large Appliances (500 pts)</option>
                <option value="50">Batteries/Cables (50 pts)</option>
            </select>

            <div style="margin: 15px 0;">
                <input type="checkbox" id="pickup-toggle" style="width:auto"> 
                <label for="pickup-toggle" style="font-size:14px">Request Home Pickup?</label>
            </div>

            <button class="btn" onclick="addEntry()">Submit Entry</button>
        </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="sidebar">
        <!-- POINTS BOX -->
        <div class="box stat-card">
            <p style="margin:0; color: #64748b; font-size: 14px;">Total Credits Earned</p>
            <div class="points" id="total-points">0</div>
        </div>

        <!-- RECENT ACTIVITY -->
        <div class="box">
            <h4 style="margin-top:0">Recent Activity</h4>
            <div id="activity-list">
                <p style="font-size: 13px; color: #94a3b8;">No entries yet.</p>
            </div>
            <button class="btn" style="background: #f1f5f9; color: #475569; margin-top: 10px; font-size: 12px;" onclick="clearData()">Clear History</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Simple Database Logic
    let data = JSON.parse(localStorage.getItem('ecocycle_simple')) || { items: [], points: 0 };

    // Initialize Map
    const map = L.map('map').setView([19.076, 72.877], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Add some fake centers
    const centers = [
        {name: "City E-Waste Center", pos: [19.076, 72.877]},
        {name: "Green Earth Recycling", pos: [19.120, 72.900]},
        {name: "Tech Recovery Hub", pos: [19.030, 72.850]}
    ];
    centers.forEach(c => L.marker(c.pos).addTo(map).bindPopup(c.name));

    function addEntry() {
        const name = document.getElementById('item-name').value;
        const pointsToAdd = parseInt(document.getElementById('item-cat').value);
        const needsPickup = document.getElementById('pickup-toggle').checked;

        if (!name) return alert("Please enter the item name.");

        // Add to data
        data.items.unshift({
            name: name,
            points: pointsToAdd,
            pickup: needsPickup,
            date: new Date().toLocaleDateString()
        });
        data.points += pointsToAdd;

        // Save and Update UI
        localStorage.setItem('ecocycle_simple', JSON.stringify(data));
        updateUI();
        
        // Reset Form
        document.getElementById('item-name').value = "";
        document.getElementById('pickup-toggle').checked = false;
        alert("Success! Points added.");
    }

    function updateUI() {
        document.getElementById('total-points').innerText = data.points;
        
        const list = document.getElementById('activity-list');
        if (data.items.length === 0) {
            list.innerHTML = `<p style="font-size: 13px; color: #94a3b8;">No entries yet.</p>`;
            return;
        }

        list.innerHTML = data.items.slice(0, 5).map(i => `
            <div class="history-item">
                <span><strong>${i.name}</strong><br><small>${i.date}</small></span>
                <span class="status-badge">${i.pickup ? 'Pickup' : 'Drop-off'}</span>
            </div>
        `).join('');
    }

    function clearData() {
        if(confirm("Delete all history?")) {
            data = { items: [], points: 0 };
            localStorage.setItem('ecocycle_simple', JSON.stringify(data));
            updateUI();
        }
    }

    // Initial load
    updateUI();
</script>
</body>
</html>
