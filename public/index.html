<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle | Premium E-Waste Recovery</title>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- PREMIUM CSS (GLASSMORPHISM & NEON) --- */
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f0abfc;
            --bg: #030712;
            --glass: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0f172a 0%, #030712 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
            min-height: 100vh;
        }

        nav {
            background: rgba(3, 7, 18, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.2rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            padding: 0 20px;
        }

        /* Glassmorphism Boxes */
        .box {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .box:hover {
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-4px);
        }

        h3 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Map Styling */
        #map {
            height: 350px;
            border-radius: 18px;
            border: 2px solid var(--glass-border);
            margin: 15px 0;
            filter: saturate(1.2) contrast(1.1);
        }

        #loc-status {
            padding: 12px;
            background: rgba(0, 242, 254, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 242, 254, 0.1);
            color: var(--primary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Elements */
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            margin-top: 20px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Custom Upload Zone */
        .upload-zone {
            display: block;
            border: 2px dashed var(--text-dim);
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            margin-top: 10px;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.05);
            color: var(--primary);
        }

        .upload-zone i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .img-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 14px;
            margin-top: 15px;
            display: none;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-out;
        }

        /* Buttons */
        .btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #030712;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.5);
            transform: rotate(30deg);
            transition: all 0.6s ease;
        }

        .btn:hover::after {
            left: 120%;
        }

        .gps-btn {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-family: inherit;
        }
        .gps-btn:hover { background: rgba(0, 242, 254, 0.2); }

        .export-btn {
            background: rgba(240, 171, 252, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-family: inherit;
        }
        .export-btn:hover { background: rgba(240, 171, 252, 0.2); }

        .clear-btn {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
            font-family: inherit;
        }
        .clear-btn:hover { background: rgba(255, 77, 77, 0.2); }

        /* Sidebar Stats */
        .stat-card {
            background: linear-gradient(180deg, rgba(0, 242, 254, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            border: 1px solid rgba(0, 242, 254, 0.2);
            text-align: center;
        }

        .points {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.3));
            line-height: 1;
            margin: 10px 0;
        }

        /* Activity List */
        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--glass-border);
        }

        .thumb {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-10px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-bolt"></i> EcoCycle</div>
    <div style="font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-circle" style="color: #00ff00; font-size: 8px; filter: drop-shadow(0 0 5px #00ff00);"></i> 
        Live Network
    </div>
</nav>

<div class="container">
    <main>
        <!-- LOCATION SECTION -->
        <div class="box">
            <h3><i class="fas fa-satellite" style="color: var(--primary);"></i> 1. Satellite Target</h3>
            <p style="font-size: 0.85rem; opacity: 0.7; margin-top: -5px;">Tap the map to precisely mark your recovery coordinates.</p>
            
            <div id="map"></div>
            
            <div id="loc-status">
                <i class="fas fa-crosshairs"></i> Awaiting precise location...
            </div>
            
            <!-- NEW: GPS AUTO-LOCATE BUTTON -->
            <button class="gps-btn" onclick="useCurrentLocation()">
                <i class="fas fa-location-arrow"></i> Use My GPS Location
            </button>
        </div>

        <!-- DETAILS SECTION -->
        <div class="box">
            <h3><i class="fas fa-camera-retro" style="color: var(--accent);"></i> 2. Device Details</h3>
            
            <label style="margin-top: 15px;">Visual Verification</label>
            <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)" style="display: none;">
            <label for="file-input" class="upload-zone">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Click to Upload Device Photo</span>
            </label>
            <img id="preview" class="img-preview">

            <label>Device Specification</label>
            <input type="text" id="item-name" placeholder="e.g. Broken iPhone 12, Old Dell Monitor...">
            
            <label>Impact Category</label>
            <select id="item-cat">
                <option value="100">Small Electronics (Phones, Tablets) - 100 pts</option>
                <option value="500">Major Appliances (TVs, Fridges) - 500 pts</option>
                <option value="50">Cables & Accessories - 50 pts</option>
            </select>

            <button class="btn" onclick="addEntry()">Submit Recovery Log</button>
        </div>
    </main>

    <aside>
        <!-- STATS SECTION -->
        <div class="box stat-card">
            <p style="color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin: 0;">Total Impact</p>
            <div class="points" id="total-points">0</div>
            <small style="text-transform: uppercase; letter-spacing: 2px; color: var(--primary); font-weight: 800;">Green Credits</small>
        </div>

        <!-- ACTIVITY SECTION -->
        <div class="box">
            <h4 style="margin-top:0; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;">Recent Recoveries</h4>
            <div id="activity-list"></div>
            
            <!-- NEW: EXPORT DATA BUTTON -->
            <button class="export-btn" onclick="exportData()">
                <i class="fas fa-download"></i> Export Recovery Log
            </button>
            
            <button class="clear-btn" onclick="clearData()">
                <i class="fas fa-trash-alt"></i> Wipe Network Data
            </button>
        </div>
    </aside>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- STATE MANAGEMENT ---
    let data = JSON.parse(localStorage.getItem('ecocycle_v4')) || { items: [], points: 0 };
    let selectedCoords = [19.076, 72.877];
    let capturedImage = "";
    let previousPoints = 0;

    // --- CUSTOM TOAST NOTIFICATIONS ---
    function showToast(message, type = "success") {
        const toast = document.createElement('div');
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.cssText = `
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: ${type === 'error' ? 'rgba(255, 77, 77, 0.9)' : 'rgba(0, 242, 254, 0.9)'};
            color: ${type === 'error' ? '#fff' : '#030712'};
            padding: 12px 24px; border-radius: 50px; font-weight: 700; font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; display: flex; align-items: center; gap: 8px;
        `;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.style.transform = 'translateX(-50%) translateY(0)', 10);
        setTimeout(() => {
            toast.style.transform = 'translateX(-50%) translateY(100px)';
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }

    // --- MAP INITIALIZATION ---
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(selectedCoords, 15);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { pane: 'shadowPane' }).addTo(map);

    let marker = L.marker(selectedCoords, {
        draggable: true,
        icon: L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:var(--primary); width:15px; height:15px; border-radius:50%; border:2px solid white; box-shadow:0 0 15px var(--primary);'></div>",
            iconSize: [15, 15],
            iconAnchor: [7, 7]
        })
    }).addTo(map);

    map.on('click', function(e) { updateLocation(e.latlng.lat, e.latlng.lng); });
    marker.on('dragend', function(e) { 
        const pos = marker.getLatLng(); 
        updateLocation(pos.lat, pos.lng); 
    });

    function updateLocation(lat, lng) {
        selectedCoords = [lat, lng];
        marker.setLatLng([lat, lng]);
        map.panTo([lat, lng]);
        document.getElementById('loc-status').innerHTML = `<i class="fas fa-check-circle"></i> Target Locked: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        document.getElementById('loc-status').style.color = '#00ff00';
    }

    // --- GPS AUTO-LOCATE ---
    function useCurrentLocation() {
        if ("geolocation" in navigator) {
            showToast("Acquiring satellite lock...", "success");
            navigator.geolocation.getCurrentPosition(position => {
                updateLocation(position.coords.latitude, position.coords.longitude);
                map.setZoom(18);
                showToast("GPS Lock Acquired!");
            }, error => {
                showToast("Location access denied or unavailable.", "error");
            });
        } else {
            showToast("Geolocation not supported by this browser.", "error");
        }
    }

    // --- IMAGE HANDLING ---
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function() {
                capturedImage = reader.result;
                const preview = document.getElementById('preview');
                preview.src = capturedImage;
                preview.style.display = 'block';
                document.querySelector('.upload-zone').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    // --- DATA MANAGEMENT ---
    function addEntry() {
        const name = document.getElementById('item-name').value;
        const pts = parseInt(document.getElementById('item-cat').value);

        if (!name || !capturedImage) {
            showToast("Please upload a photo and enter an item name.", "error");
            return;
        }

        const entry = {
            id: Date.now(),
            name, points: pts, image: capturedImage, coords: selectedCoords, date: new Date().toLocaleDateString()
        };

        data.items.unshift(entry);
        previousPoints = data.points;
        data.points += pts;
        localStorage.setItem('ecocycle_v4', JSON.stringify(data));
        
        showToast(`Success! +${pts} Green Credits earned.`);
        updateUI();
        resetForm();
    }

    function resetForm() {
        document.getElementById('item-name').value = "";
        document.getElementById('file-input').value = "";
        document.getElementById('preview').style.display = 'none';
        document.querySelector('.upload-zone').style.display = 'block';
        capturedImage = "";
    }

    // --- EXPORT DATA ---
    function exportData() {
        if (data.items.length === 0) return showToast("No data to export.", "error");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "ecocycle_backup_" + new Date().getTime() + ".json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
        showToast("Data exported successfully!");
    }

    // --- SHARE FUNCTION ---
    function shareItem(name, points) {
        if (navigator.share) {
            navigator.share({
                title: 'EcoCycle Recovery',
                text: `I just safely recovered a ${name} and earned ${points} Green Credits on EcoCycle! 🌍♻️`,
            }).catch(console.error);
        } else {
            showToast("Sharing not supported on this browser.", "error");
        }
    }

    // --- UI RENDERING & ANIMATIONS ---
    function animateValue(id, start, end, duration) {
        if (start === end) return;
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    function updateUI() {
        animateValue("total-points", previousPoints, data.points, 1000);
        previousPoints = data.points;

        const list = document.getElementById('activity-list');
        if (data.items.length === 0) {
            list.innerHTML = `<p style="text-align:center; opacity:0.4; font-size: 0.9rem; padding: 20px 0;">No active recoveries logged.</p>`;
            return;
        }

        list.innerHTML = data.items.slice(0, 4).map(i => `
            <div class="history-item">
                <img src="${i.image}" class="thumb">
                <div style="flex:1">
                    <div style="font-weight:700; font-size: 0.95rem;">${i.name}</div>
                    <div style="font-size:0.75rem; color: var(--text-dim); margin-top: 4px;">
                        <i class="far fa-calendar-alt"></i> ${i.date} • <span style="color: var(--primary); font-weight: 600;">+${i.points} pts</span>
                    </div>
                </div>
                <div style="display:flex; gap: 8px;">
                    <div style="background: rgba(240, 171, 252, 0.1); padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;" onclick="shareItem('${i.name}', ${i.points})" title="Share">
                        <i class="fas fa-share-alt" style="color:var(--accent); font-size: 0.9rem;"></i>
                    </div>
                    <div style="background: rgba(0, 242, 254, 0.1); padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center;" title="Lat: ${i.coords[0].toFixed(3)}, Lon: ${i.coords[1].toFixed(3)}">
                        <i class="fas fa-location-arrow" style="color:var(--primary); font-size: 0.9rem;"></i>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function clearData() {
        if(confirm("⚠️ Are you sure you want to wipe all local recovery data? This cannot be undone.")) {
            previousPoints = 0;
            data = { items: [], points: 0 };
            localStorage.removeItem('ecocycle_v4');
            document.getElementById('total-points').innerText = "0";
            updateUI();
            showToast("Network data wiped.", "error");
        }
    }

    // Init
    document.getElementById('total-points').innerText = data.points;
    previousPoints = data.points;
    updateUI();
</script>
</body>
</html>
