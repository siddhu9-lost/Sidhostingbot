<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle | Premium E-Waste Recovery</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- PREMIUM CSS (GLASSMORPHISM & NEON) --- */
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f0abfc;
            --bg: #030712;
            --glass: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0f172a 0%, #030712 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
            min-height: 100vh;
        }

        nav {
            background: rgba(3, 7, 18, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.2rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
            font-family: inherit;
        }

        .logout-btn:hover {
            background: rgba(255, 77, 77, 0.2);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            padding: 0 20px;
        }

        /* Glassmorphism Boxes */
        .box {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .box:hover {
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-4px);
        }

        h3 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Map Styling */
        #map {
            height: 350px;
            border-radius: 18px;
            border: 2px solid var(--glass-border);
            margin: 15px 0;
            filter: saturate(1.2) contrast(1.1);
        }

        #loc-status {
            padding: 12px;
            background: rgba(0, 242, 254, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 242, 254, 0.1);
            color: var(--primary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Elements */
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            margin-top: 20px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Custom Upload Zone */
        .upload-zone {
            display: block;
            border: 2px dashed var(--text-dim);
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            margin-top: 10px;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.05);
            color: var(--primary);
        }

        .upload-zone i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .img-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 14px;
            margin-top: 15px;
            display: none;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-out;
        }

        /* Buttons */
        .btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #030712;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.5);
            transform: rotate(30deg);
            transition: all 0.6s ease;
        }

        .btn:hover::after {
            left: 120%;
        }

        .gps-btn {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-family: inherit;
        }
        .gps-btn:hover { background: rgba(0, 242, 254, 0.2); }

        .export-btn {
            background: rgba(240, 171, 252, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-family: inherit;
        }
        .export-btn:hover { background: rgba(240, 171, 252, 0.2); }

        .clear-btn {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
            font-family: inherit;
        }
        .clear-btn:hover { background: rgba(255, 77, 77, 0.2); }

        /* Sidebar Stats */
        .stat-card {
            background: linear-gradient(180deg, rgba(0, 242, 254, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            border: 1px solid rgba(0, 242, 254, 0.2);
            text-align: center;
        }

        .points {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.3));
            line-height: 1;
            margin: 10px 0;
        }

        /* Activity List */
        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--glass-border);
        }

        .thumb {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-10px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-bolt"></i> EcoCycle</div>
    <div class="nav-controls">
        <div style="font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-circle" style="color: #00ff00; font-size: 8px; filter: drop-shadow(0 0 5px #00ff00);"></i> 
            Live Network
        </div>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</nav>

<div class="container">
    <main>
        <div class="box">
            <h3><i class="fas fa-satellite" style="color: var(--primary);"></i> 1. Satellite Target</h3>
            <p style="font-size: 0.85rem; opacity: 0.7; margin-top: -5px;">Tap the map to precisely mark your recovery coordinates.</p>
            
            <div id="map"></div>
            
            <div id="loc-status">
                <i class="fas fa-crosshairs"></i> Awaiting precise location...
            </div>
            
            <button class="gps-btn" onclick="useCurrentLocation()">
                <i class="fas fa-location-arrow"></i> Use My GPS Location
            </button>
        </div>

        <div class="box">
            <h3><i class="fas fa-camera-retro" style="color: var(--accent);"></i> 2. Device Details</h3>
            
            <label style="margin-top: 15px;">Visual Verification</label>
            <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)" style="display: none;">
            <label for="file-input" class="upload-zone">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Click to Upload Device Photo</span>
            </label>
            <img id="preview" class="img-preview">

            <label>Device Specification</label>
            <input type="text" id="item-name" placeholder="e.g. Broken iPhone 12, Old Dell Monitor...">
            
            <label>Impact Category</label>
            <select id="item-cat">
                <option value="100">Small Electronics (Phones, Tablets) - 100 pts</option>
                <option value="500">Major Appliances (TVs, Fridges) - 500 pts</option>
                <option value="50">Cables & Accessories - 50 pts</option>
            </select>

            <button class="btn" onclick="addEntry()">Submit Recovery Log</button>
        </div>
    </main>

    <aside>
        <div class="box stat-card">
            <p style="color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin: 0;">Total Impact</p>
            <div class="points" id="total-points">0</div>
            <small style="text-transform: uppercase; letter-spacing: 2px; color: var(--primary); font-weight: 800;">Green Credits</small>
        </div>

        <div class="box">
            <h4 style="margin-top:0; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;">Recent Recoveries</h4>
            <div id="activity-list"></div>
            
            <button class="export-btn" onclick="exportData()">
                <i class="fas fa-download"></i> Export Recovery Log
            </button>
            
            <button class="clear-btn" onclick="clearData()">
                <i class="fas fa-trash-alt"></i> Wipe Network Data
            </button>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
