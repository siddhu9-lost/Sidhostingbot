<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle | Railway Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00c853; --dark: #1a1a2e; --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f0f2f5; }
        nav { background: var(--dark); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: var(--shadow); }
        #map { height: 400px; border-radius: 12px; margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .open { background: #ff3d00; }
        .solved { background: #00e676; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">EcoCycle ♻️</div>
    <div id="user-display"></div>
</nav>

<div class="container">
    <!-- LOGIN -->
    <div id="login-view" class="card">
        <h2 style="text-align: center;">Access Portal</h2>
        <select id="role" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="user">Citizen Login</option>
            <option value="admin">Municipal Authority</option>
        </select>
        <input type="text" id="username" placeholder="Your Name" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
        <button class="btn" style="width:100%" onclick="login()">Enter System</button>
    </div>

    <!-- USER VIEW -->
    <div id="user-view" class="hidden">
        <div class="card">
            <h3>Find Facilities</h3>
            <div id="map"></div>
        </div>
        <div class="card">
            <h3>Report Waste</h3>
            <input type="file" id="imgInp" accept="image/*" onchange="document.getElementById('pre').src = window.URL.createObjectURL(this.files[0]); document.getElementById('pre').style.display='block';">
            <img id="pre" style="width:100px; display:none; margin:10px 0;">
            <input type="text" id="item" placeholder="Item type (e.g. Printer)" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn" onclick="addTicket()">Submit Report</button>
        </div>
        <div class="card">
            <h3>My Ticket Status</h3>
            <div id="user-tickets"></div>
        </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="admin-view" class="hidden">
        <div class="card">
            <h2>Municipal Requests</h2>
            <table>
                <thead><tr><th>User</th><th>Item</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="admin-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let tickets = [];
    let user = "";
    const map = L.map('map').setView([20.5937, 78.9629], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function login() {
        user = document.getElementById('username').value || "Guest";
        const role = document.getElementById('role').value;
        document.getElementById('login-view').className = 'hidden';
        document.getElementById('user-display').innerText = `Hello, ${user}`;
        
        if(role === 'user') {
            document.getElementById('user-view').classList.remove('hidden');
            setTimeout(() => map.invalidateSize(), 200);
        } else {
            document.getElementById('admin-view').classList.remove('hidden');
            renderAdmin();
        }
    }

    function addTicket() {
        const item = document.getElementById('item').value;
        tickets.push({ id: Date.now(), user, item, status: 'Open' });
        renderUser();
        alert("Report Sent!");
    }

    function renderUser() {
        const div = document.getElementById('user-tickets');
        div.innerHTML = tickets.filter(t => t.user === user).map(t => `
            <div style="padding:10px; border-bottom:1px solid #eee">
                <span class="status-dot ${t.status.toLowerCase()}"></span> ${t.item} - <b>${t.status}</b>
            </div>
        `).join('');
    }

    function renderAdmin() {
        const tbody = document.getElementById('admin-list');
        tbody.innerHTML = tickets.map(t => `
            <tr>
                <td>${t.user}</td>
                <td>${t.item}</td>
                <td><span class="status-dot ${t.status.toLowerCase()}"></span>${t.status}</td>
                <td><button onclick="resolve(${t.id})">Solve</button></td>
            </tr>
        `).join('');
    }

    function resolve(id) {
        const t = tickets.find(x => x.id === id);
        if(t) t.status = "Solved";
        renderAdmin();
    }
</script>
</body>
</html>
