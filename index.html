<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Dump Solution - Web Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-section" class="container">
        <h2>e-Dump Solution</h2>
        <p>Login or Register to report e-waste</p>
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        <div class="button-group">
            <button id="login-btn">Login</button>
            <button id="register-btn" class="secondary">Register</button>
        </div>
        <p id="auth-error" class="error-msg"></p>
    </div>

    <div id="app-section" class="container" style="display: none;">
        <header>
            <h2>Facility Locator</h2>
            <button id="logout-btn" class="secondary small">Logout</button>
        </header>

        <div id="map"></div>

        <div class="upload-section">
            <h3>Report E-Waste</h3>
            
            <input type="file" id="waste-image" accept="image/*" capture="environment">
            
            <button id="get-location-btn" class="secondary">📍 Fetch My Location</button>
            <p id="location-status"></p>

            <button id="submit-report-btn">Submit Report</button>
        </div>
    </div>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
    
    <script type="module" src="app.js"></script>

</body>
</html>
